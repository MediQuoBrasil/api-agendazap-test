<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AgendaZap — Simulador de Pagamento</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,700;1,9..40,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />

  <style>
    /* ── reset & vars ─────────────────────────────── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:       #0c0f14;
      --surface:  #151921;
      --border:   #1f2633;
      --text:     #e4e8f1;
      --muted:    #6b7a99;
      --accent:   #22d68a;
      --accent-d: #17a86b;
      --danger:   #f25f5c;
      --warn:     #f0c040;
      --radius:   12px;
      --font:     'DM Sans', sans-serif;
      --mono:     'Space Mono', monospace;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── topbar ───────────────────────────────────── */
    .topbar {
      width: 100%;
      padding: 18px 32px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    .topbar .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--accent); animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{ opacity:.4 } 50%{ opacity:1 } }
    .topbar span { font-size: 13px; font-family: var(--mono); color: var(--muted); letter-spacing: .5px; text-transform: uppercase; }

    /* ── layout ───────────────────────────────────── */
    .wrapper {
      width: 100%;
      max-width: 960px;
      padding: 40px 24px 80px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 32px;
    }
    @media (max-width: 700px) {
      .wrapper { grid-template-columns: 1fr; }
    }

    /* ── card ─────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--accent), transparent);
    }
    .card h2 {
      font-size: 15px;
      font-family: var(--mono);
      color: var(--muted);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 24px;
    }

    /* ── config card (URL do Apps Script) ─────────── */
    .config-card {
      grid-column: 1 / -1;
    }
    .config-card .row {
      display: flex; gap: 12px; align-items: end;
    }
    .config-card .row .field { flex: 1; }

    /* ── form elements ────────────────────────────── */
    .field { margin-bottom: 18px; }
    .field label {
      display: block;
      font-size: 12px;
      font-family: var(--mono);
      color: var(--muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: .5px;
    }
    .field input, .field select {
      width: 100%;
      padding: 10px 14px;
      font-family: var(--font);
      font-size: 15px;
      color: var(--text);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      outline: none;
      transition: border .2s;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); }
    .field input::placeholder { color: var(--muted); opacity: .6; }
    .field select option { background: var(--bg); color: var(--text); }

    /* ── buttons ──────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 13px 20px;
      font-family: var(--mono);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: .5px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: transform .15s, box-shadow .25s;
    }
    .btn:active { transform: scale(.97); }
    .btn-accent {
      background: var(--accent);
      color: #0c0f14;
      box-shadow: 0 0 24px rgba(34,214,138,.15);
    }
    .btn-accent:hover { box-shadow: 0 0 32px rgba(34,214,138,.3); }
    .btn-accent:disabled { opacity: .4; cursor: not-allowed; }
    .btn-outline {
      background: transparent;
      color: var(--accent);
      border: 1px solid var(--accent);
    }
    .btn-outline:hover { background: rgba(34,214,138,.08); }
    .btn-sm { padding: 10px 16px; font-size: 12px; width: auto; }

    /* ── stepper ──────────────────────────────────── */
    .steps { display: flex; gap: 6px; margin-bottom: 24px; }
    .steps .step {
      flex: 1;
      height: 4px;
      border-radius: 4px;
      background: var(--border);
      transition: background .4s;
    }
    .steps .step.done { background: var(--accent); }
    .steps .step.active { background: var(--warn); animation: barPulse 1s infinite; }
    @keyframes barPulse { 0%,100%{ opacity:.5 } 50%{ opacity:1 } }

    /* ── log panel ────────────────────────────────── */
    .log-panel {
      grid-column: 1 / -1;
    }
    #log {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      max-height: 400px;
      overflow-y: auto;
      font-family: var(--mono);
      font-size: 12px;
      line-height: 1.8;
      color: var(--muted);
    }
    #log::-webkit-scrollbar { width: 6px; }
    #log::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    .log-ok   { color: var(--accent); }
    .log-err  { color: var(--danger); }
    .log-warn { color: var(--warn); }
    .log-info { color: var(--muted); }

    /* ── result banner ────────────────────────────── */
    .result-banner {
      grid-column: 1 / -1;
      display: none;
      background: linear-gradient(135deg, rgba(34,214,138,.08), rgba(34,214,138,.02));
      border: 1px solid var(--accent);
      border-radius: var(--radius);
      padding: 28px;
      text-align: center;
      animation: fadeUp .5s ease;
    }
    @keyframes fadeUp { from { opacity:0; transform:translateY(12px) } to { opacity:1; transform:translateY(0) } }
    .result-banner.show { display: block; }
    .result-banner h3 { font-size: 18px; margin-bottom: 8px; color: var(--accent); }
    .result-banner a {
      display: inline-block;
      margin-top: 12px;
      font-family: var(--mono);
      font-size: 14px;
      color: var(--accent);
      word-break: break-all;
    }
    .result-banner .meta { font-size: 12px; color: var(--muted); margin-top: 10px; }

    /* ── error banner ─────────────────────────────── */
    .error-banner {
      grid-column: 1 / -1;
      display: none;
      background: rgba(242,95,92,.06);
      border: 1px solid var(--danger);
      border-radius: var(--radius);
      padding: 20px;
      color: var(--danger);
      font-size: 14px;
      animation: fadeUp .5s ease;
    }
    .error-banner.show { display: block; }
  </style>
</head>
<body>

  <!-- topbar -->
  <div class="topbar">
    <div class="dot"></div>
    <span>AgendaZap · Test Environment</span>
  </div>

  <div class="wrapper">

    <!-- ── CONFIG ──────────────────────────────── -->
    <div class="card config-card">
      <h2>⚙ Configuração</h2>
      <div class="row">
        <div class="field" style="margin-bottom:0">
          <label>URL do Apps Script (Web App)</label>
          <input id="appsScriptUrl" type="url" placeholder="https://script.google.com/macros/s/AKfycbz4W9tRL6MWNKtkVxfNkuxZ5O4q6ERR-iSgZxO8hIm7EuOnLtcN_J1AaEcNLlwAIab7Og/exec" />
        </div>
        <button class="btn btn-outline btn-sm" onclick="carregarListas()">Carregar listas</button>
      </div>
    </div>

    <!-- ── FORM: dados do cliente ─────────────── -->
    <div class="card">
      <h2>01 · Dados do Cliente</h2>
      <div class="field">
        <label>Nome completo</label>
        <input id="nome" type="text" placeholder="Maria da Silva" />
      </div>
      <div class="field">
        <label>Telefone (com DDI, só números)</label>
        <input id="telefone" type="tel" placeholder="5531999998888" />
      </div>
      <div class="field">
        <label>Serviço</label>
        <select id="servico">
          <option value="">— carregue as listas primeiro —</option>
        </select>
      </div>
      <div class="field">
        <label>Atendente</label>
        <select id="atendente">
          <option value="">— carregue as listas primeiro —</option>
        </select>
      </div>
      <div class="field">
        <label>Expiração do link (min)</label>
        <input id="expira" type="number" value="120" min="10" max="2880" />
      </div>
    </div>

    <!-- ── SIMULADOR de pagamento ─────────────── -->
    <div class="card">
      <h2>02 · Simular Pagamento</h2>
      <p style="font-size:13px;color:var(--muted);margin-bottom:20px;">
        Ao clicar, o fluxo completo será executado:<br>
        <strong style="color:var(--text)">Validar → Cadastrar (se necessário) → Gerar link</strong>
      </p>

      <div class="steps">
        <div class="step" id="s1"></div>
        <div class="step" id="s2"></div>
        <div class="step" id="s3"></div>
      </div>

      <div style="font-family:var(--mono);font-size:12px;color:var(--muted);margin-bottom:20px;display:flex;justify-content:space-between">
        <span>Validar</span><span>Cadastrar</span><span>Gerar Link</span>
      </div>

      <button id="btnPagar" class="btn btn-accent" onclick="executarFluxo()">
        Simular pagamento aprovado
      </button>
    </div>

    <!-- ── RESULTADO ──────────────────────────── -->
    <div class="result-banner" id="resultado">
      <h3>Link de Agendamento Gerado</h3>
      <a id="linkGerado" href="#" target="_blank"></a>
      <div class="meta" id="metaInfo"></div>
    </div>

    <!-- ── ERRO ───────────────────────────────── -->
    <div class="error-banner" id="erroBanner"></div>

    <!-- ── LOG ─────────────────────────────────── -->
    <div class="card log-panel">
      <h2>Console · Request Log</h2>
      <div id="log"></div>
    </div>

  </div>

  <script>
    // ── helpers ─────────────────────────────────

    const $ = id => document.getElementById(id);

    function getUrl() {
      const url = $('appsScriptUrl').value.trim();
      if (!url) throw new Error('Preencha a URL do Apps Script primeiro.');
      return url;
    }

    function log(msg, cls = 'log-info') {
      const ts = new Date().toLocaleTimeString('pt-BR');
      $('log').innerHTML += `<div class="${cls}"><span style="opacity:.5">[${ts}]</span> ${msg}</div>`;
      $('log').scrollTop = $('log').scrollHeight;
    }

    function setStep(n, state) {
      const el = $('s' + n);
      el.classList.remove('done', 'active');
      if (state) el.classList.add(state);
    }

    function resetSteps() {
      [1,2,3].forEach(n => setStep(n, null));
      $('resultado').classList.remove('show');
      $('erroBanner').classList.remove('show');
    }

    // ── carregar listas (serviços e atendentes) ──

    async function carregarListas() {
      try {
        const base = getUrl();
        log('GET → lista_servicos ...', 'log-info');

        const [rServ, rAte] = await Promise.all([
          fetch(base + '?action=servicos').then(r => r.json()),
          fetch(base + '?action=atendentes').then(r => r.json())
        ]);

        log('Resposta servicos: ' + JSON.stringify(rServ), rServ.status === 'success' ? 'log-ok' : 'log-err');
        log('Resposta atendentes: ' + JSON.stringify(rAte), rAte.status === 'success' ? 'log-ok' : 'log-err');

        // popular selects
        const selServ = $('servico');
        selServ.innerHTML = '<option value="">— nenhum (opcional) —</option>';
        (rServ.servicos || []).forEach(s => {
          selServ.innerHTML += `<option value="${s.id}">${s.descricao}</option>`;
        });

        const selAte = $('atendente');
        selAte.innerHTML = '<option value="">— nenhum (opcional) —</option>';
        (rAte.atendentes || []).forEach(a => {
          selAte.innerHTML += `<option value="${a.id}">${a.descricao}</option>`;
        });

        log(`Listas carregadas: ${rServ.total || 0} serviços, ${rAte.total || 0} atendentes`, 'log-ok');
      } catch (err) {
        log('ERRO: ' + err.message, 'log-err');
      }
    }

    // ── fluxo completo ──────────────────────────

    async function executarFluxo() {
      resetSteps();
      const btn = $('btnPagar');
      btn.disabled = true;
      btn.textContent = 'Processando…';

      try {
        const base = getUrl();
        const nome     = $('nome').value.trim();
        const telefone = $('telefone').value.trim().replace(/\D/g, '');

        if (!nome || !telefone) throw new Error('Preencha nome e telefone.');

        const payload = {
          action: 'fluxo_completo',
          nome,
          telefone,
          tempo_expira: parseInt($('expira').value) || 120
        };

        const serv = $('servico').value;
        const ate  = $('atendente').value;
        if (serv) payload.id_servico   = parseInt(serv);
        if (ate)  payload.id_atendente = parseInt(ate);

        log('━━━ INÍCIO DO FLUXO ━━━', 'log-warn');
        log('Payload: ' + JSON.stringify(payload), 'log-info');

        // step 1: validação
        setStep(1, 'active');
        log('Etapa 1 → validar_cliente ...', 'log-info');

        const resp = await fetch(base, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify(payload)
        }).then(r => r.json());

        log('Resposta completa: ' + JSON.stringify(resp), resp.status === 'success' ? 'log-ok' : 'log-err');

        if (resp.status !== 'success') {
          throw new Error(resp.message || JSON.stringify(resp));
        }

        // marcar steps
        setStep(1, 'done');

        if (resp.cliente_existente) {
          log('Cliente já existia (ID ' + resp.cliente_id + '). Cadastro não necessário.', 'log-warn');
          setStep(2, 'done');
        } else {
          log('Cliente novo cadastrado (ID ' + resp.cliente_id + ').', 'log-ok');
          setStep(2, 'done');
        }

        setStep(3, 'done');

        // mostrar resultado
        if (resp.link_agendamento) {
          $('linkGerado').href = resp.link_agendamento;
          $('linkGerado').textContent = resp.link_agendamento;
          $('metaInfo').innerHTML = [
            resp.cliente_existente ? '♻ Cliente já existia' : '✨ Cliente novo cadastrado',
            `ID: ${resp.cliente_id}`,
            `Expira em: ${resp.tempo_expira || '—'} min`,
            resp.vinculos?.id_servico   ? `Serviço: #${resp.vinculos.id_servico}` : '',
            resp.vinculos?.id_atendente ? `Atendente: #${resp.vinculos.id_atendente}` : ''
          ].filter(Boolean).join(' · ');
          $('resultado').classList.add('show');
          log('Link gerado com sucesso!', 'log-ok');
        } else {
          throw new Error('Link não retornado pela API.');
        }

        log('━━━ FLUXO CONCLUÍDO ━━━', 'log-ok');

      } catch (err) {
        log('ERRO: ' + err.message, 'log-err');
        $('erroBanner').textContent = err.message;
        $('erroBanner').classList.add('show');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Simular pagamento aprovado';
      }
    }
  </script>

</body>
</html>
